name: ADS Enterprise CI Pipeline

# Make GitHub to run this script every time you push code to the 'main' or 'master' branch
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Node.js v20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install all dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Compile the TypeScript and make sure there are no syntax errors
      - name: Build TypeScript
        run: npm run build

      # 5. Run the Jest Tests
      - name: Run Unit & Integration Tests
        run: npm test
