# --- THE MYSQL DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  replicas: 1 # Only 1 database to avoid data conflicts
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
        - name: mysql
          image: mysql:8.0 # The official MySQL image
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "dental123" # Set your secure root password here
            - name: MYSQL_DATABASE
              value: "adv_dental_surgeries" # It will auto-create this database on startup!

---
# --- THE MYSQL SERVICE (Internal Network) ---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service # The magic K8s DNS name!
spec:
  selector:
    app: mysql-db
  ports:
    - port: 3306
      targetPort: 3306
